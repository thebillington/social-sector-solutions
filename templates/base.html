<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="Hannah">
  <meta name="theme-color" content="{{ site.colors.background }}">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ site.base_url }}">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon.png">

  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url" content="{{ site.base_url }}">
  <meta property="og:image" content="{{ site.base_url }}{{ site.og_image }}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="en_GB">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="{{ site.base_url }}{{ site.og_image }}">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "name": "{{ site.title }}",
    "description": {{ site.description | tojson }},
    "url": "{{ site.base_url }}",
    "image": "{{ site.base_url }}{{ site.og_image }}",
    "email": "{{ site.contact.email }}",
    "telephone": "{{ site.contact.phone }}"
  }
  </script>

  <title>{% block title %}{{ site.title }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .font-heading { font-family: 'DM Serif Display', serif; }
    .font-body { font-family: 'Plus Jakarta Sans', sans-serif; }
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }
    .fade-up {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .offering-card {
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .offering-card:hover {
      transform: translateY(-6px);
    }
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after {
      width: 100%;
    }
    .blob-shape {
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      animation: morphBlob 8s ease-in-out infinite;
    }
    @keyframes morphBlob {
      0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
      50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
    }
    .dot-pattern {
      background-image: radial-gradient(circle, currentColor 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="h-full font-body" style="background-color: {{ site.colors.background }};">
  <div id="app-wrapper" class="w-full h-full overflow-auto">
    {% block content %}{% endblock %}
  </div>
  <script>
    document.getElementById('mobile-toggle').addEventListener('click', function() {
      var menu = document.getElementById('mobile-menu');
      menu.classList.toggle('hidden');
    });
    document.querySelectorAll('#mobile-menu a').forEach(function(link) {
      link.addEventListener('click', function() {
        document.getElementById('mobile-menu').classList.add('hidden');
      });
    });
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.fade-up').forEach(function(el) {
      observer.observe(el);
    });
    lucide.createIcons();
  </script>
</body>
</html>
