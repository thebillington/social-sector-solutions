<nav id="main-nav" class="fixed top-0 left-0 right-0 z-50 transition-all duration-300" style="background-color: {{ site.colors.background }}E6; backdrop-filter: blur(12px);">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">
    <div></div>
    <div class="hidden md:flex items-center gap-8">
      {% for item in nav.links %}
      <a href="{{ item.href }}" class="nav-link text-sm font-medium" style="color: {{ site.colors.text_mid }};">{{ item.label }}</a>
      {% endfor %}
      <a href="{{ nav.cta.href }}" class="px-5 py-2.5 rounded-full text-sm font-semibold transition-all duration-300 hover:scale-105" style="background-color: {{ site.colors.primary }}; color: {{ site.colors.background }};">{{ nav.cta.label }}</a>
    </div>
    <button id="mobile-toggle" class="md:hidden p-2 rounded-lg" style="color: {{ site.colors.text_dark }};">
      <i data-lucide="menu" style="width:24px;height:24px;"></i>
    </button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden px-6 pb-4">
    <div class="flex flex-col gap-3 pt-2 border-t" style="border-color: {{ site.colors.background }}CC;">
      {% for item in nav.links %}
      <a href="{{ item.href }}" class="text-sm font-medium py-2" style="color: {{ site.colors.text_mid }};">{{ item.label }}</a>
      {% endfor %}
      <a href="{{ nav.cta.href }}" class="text-sm font-medium py-2" style="color: {{ site.colors.primary }};">{{ nav.cta.label }}</a>
    </div>
  </div>
</nav>
